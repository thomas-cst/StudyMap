<div class="filtre-container">
    <button class="filtre-btn" (click)="clicBouton()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width:18px;"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 6h9.75M10.5 6a1.5 1.5 0 1 1-3 0m3 0a1.5 1.5 0 1 0-3 0M3.75 6H7.5m3 12h9.75m-9.75 0a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m-3.75 0H7.5m9-6h3.75m-3.75 0a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m-9.75 0h9.75" /></svg>
        Filtres
    </button>

   <div class="filtre-menu" [class.active]="isMenuActive()">
        <div class="filtre-groupe">
        
        @if (menus() === 'accueil') {
            <p id="titre-filtre">Découvrir par :</p>
        
            <label class="options">
                <input type="radio" name="option-accueil" value="itineraire" (change)="onOptionChange($event)" checked>
                <span>📍 Autour de moi</span>
            </label>

            <label class="options">
                <input type="radio" name="option-accueil" (change)="onOptionChange($event)" value="mer">
                <span>🏖️ Bord de mer</span>
            </label>

            <label class="options">
                <input type="radio" name="option-accueil" (change)="onOptionChange($event)" value="montagne">
                <span>🏔️ Montagne</span>
            </label>

            <label class="options">
                <input type="radio" name="option-accueil" (change)="onOptionChange($event)" value="top-etudiant">
                <span>🎓 Top Villes Étudiantes</span>
            </label>
        }

        @if(menus() === 'classement' || menus() === 'favoris'){
            <p id="titre-filtre">Trier par priorité :</p>
            
            <label class="options">
                <input type="radio" name="option-tri" value="budget" (change)="onOptionChange($event)" checked>
                <span>💶 Loyer le moins cher</span>
                
                <div class="slider-container">
                    <p style="font-size: 12px; margin-bottom: 5px; text-align: center;">
                        {{ budgetMin() }}€ - {{budgetMax()}}€{{ budgetMax() == 5000? '+' : ''}}
                    </p>
                    <div class="sliderBudget">
                        <div class="slider-track"></div>
                        <input type="range" [value]="budgetMin()" min="0" max="5000" step="10" (input)="updateMin($event)" class="input-min">
                        <input type="range" [value]="budgetMax()" min="0" max="5000" step="10" (input)="updateMax($event)" class="input-max">
                    </div>
                </div>
            </label>

            <label class="options">
                <input type="radio" name="option-tri" value="emploi" (change)="onOptionChange($event)">
                <span>💼 Emploi et Attractivité</span>
            </label>

            <label class="options">
                <input type="radio" name="option-tri" value="transport" (change)="onOptionChange($event)">
                <span>🚆 Qualité des transports</span>
            </label>

            <label class="options">
                <input type="radio" name="option-tri" value="vieNocturne" (change)="onOptionChange($event)">
                <span>🍻 Bars et Vie nocturne</span>
            </label>
        }
        </div>
    </div>
</div>
