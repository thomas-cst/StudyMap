<!-- Grille d'affichage des resultats de recherche -->
<div class="resultats">
  <!-- Indicateur de chargement -->
  <div *ngIf="isLoading()" class="loading">
    <p>Chargement des villes...</p>
  </div>

  <!-- Grille des cartes de villes -->
  <ng-container *ngIf="!isLoading() && filtered().length; else empty">
    <div class="ville-card" 
         *ngFor="let v of filtered()" 
         [class.expanded]="isExpanded(v)">

      <!-- Image lazy-loaded -->
      <img *ngIf="!isExpanded(v)"
           [src]="v.imageUrl || 'https://placehold.co/400x300/cccccc/333333?text=' + encodeURIComponent(v.nom)"
           [alt]="v.nom"
           loading="lazy"
           class="ville-card-bg" />
      
      <!-- Mode normal : carte avec image, bouton coeur et bouton details -->
      <ng-container *ngIf="!isExpanded(v)">
        <!-- Icône coeur en haut à droite -->
        <button class="btn-favoris" 
                [class.active]="isFavoris(v.nom)"
                (click)="toggleFavoris(v)"
                title="Ajouter aux favoris">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="heart-icon">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
        </button>

        <!-- Overlay avec dégradé et texte -->
        <div class="ville-overlay">
          <h4>{{ v.nom }}</h4>
        </div>

        <!-- Icône + en bas à droite -->
        <button class="btn-details" 
                (click)="toggleExpanded(v)"
                title="Voir plus d'infos">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="plus-icon">
            <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
          </svg>
        </button>
      </ng-container>

      <!-- Mode agrandi : affiche les details complets de la ville -->
      <ng-container *ngIf="isExpanded(v)">
        <div class="expanded-content">
          <div class="expanded-header">
            <h2>{{ v.nom }}</h2>
            <button class="btn-collapse" 
                    (click)="toggleExpanded(v)"
                    title="Réduire">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="minus-icon">
                <path d="M19 13H5v-2h14v2z"/>
              </svg>
            </button>
          </div>
          <div class="expanded-body">
            <img [src]="v.imageUrl" [alt]="v.nom" class="expanded-image" />
            <div class="expanded-info">
              <p>Détails et informations à venir...</p>
            </div>
          </div>
        </div>
      </ng-container>
    </div>
  </ng-container>
  <ng-template #empty>
    <p *ngIf="query">Aucun résultat pour « {{ query }} ».</p>
    <p *ngIf="!query">Aucune ville sélectionnée.</p>
  </ng-template>
</div>
